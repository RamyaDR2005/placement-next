name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: production-deploy
  cancel-in-progress: false # Don't cancel in-progress deploys

jobs:
  # ─── Stage 1: Build & Validate ───────────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Type check
        run: pnpm type-check

      - name: Build application
        run: pnpm build
        env:
          # Dummy values for build — Next.js needs these at build time but
          # they are replaced by real values on the server at runtime
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          DIRECT_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          AUTH_SECRET: "build-time-dummy-secret-not-used-at-runtime"
          NEXTAUTH_URL: "https://tpo.sdmcet.ac.in"
          GOOGLE_CLIENT_ID: "dummy"
          GOOGLE_CLIENT_SECRET: "dummy"

  # ─── Stage 2: Deploy to Server ───────────────────────────────────────
  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            # Load nvm (required in non-interactive shells)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            cd /var/www/campusconnect

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📦 Installing dependencies..."
            pnpm install --frozen-lockfile

            echo "🗄️ Running database migrations..."
            pnpm db:migrate:prod

            echo "🔨 Building application..."
            pnpm build

            echo "🔄 Reloading application..."
            pm2 reload campusconnect

            echo "✅ Deployment complete!"
            pm2 status

      - name: Health check
        uses: jtalk/url-health-check-action@v4
        with:
          url: https://tpo.sdmcet.ac.in
          max-attempts: 5
          retry-delay: 10s
          retry-all: true
